# Packages - Defaults File
apt_packages:
  - package: ""
    version: "*"
    state: "latest"
    allow_downgrade: false
    autoclean: true

pacman_packages:
  - package: ""
    state: "latest"

pacman_multilib:
  path: /etc/pacman.conf
  regexp: '^#\[multilib]\n#Include = \/etc\/pacman.d\/mirrorlist$'
  replace: |-
    [multilib]
    Include = /etc/pacman.d/mirrorlist
