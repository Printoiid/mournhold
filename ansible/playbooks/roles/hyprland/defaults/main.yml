# Hyprland - Default File
hyprland_config_path: "{{ dotconfig_path }}/hypr"

hyprland_repo_configs: "{{ hyprland_repo_config_path }}/config"

hyprland_repo_main_config: 
  src: "{{ hyprland_repo_config_path }}/main/hyprland.conf"
  dest: "{{ hyprland_config_path }}/hyprland.conf"

hyprland_config_files:
  src: "{{ hyprland_repo_config_path }}/config/"
  dest: "{{ hyprland_config_path }}/conf/"

