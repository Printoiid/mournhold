# Hyprland - Task File
- name: Hyprland - Install and Configure
  tags: hyprland-setup

  block:
    - name: Find all repo config file(s)
      ansible.builtin.find:
        paths: "{{ hyprland_repo_configs }}"
        file_type: file
      register: hyprland_config_files

    - name: Show config files
      ansible.builtin.debug:
        verbosity: 1
        msg: file.path
      loop: "{{ hyprland_config_files }}"
      loop_control:
        loop_var: file

    - name: Clear default config file(s)
      ansible.builtin.file:
        dest: "{{ config_file }}"
        state: absent
      loop: "{{ hyprland_config_path }}"
      loop_control:
        loop_var: config_file


    - name: Link primary config file
      ansible.builtin.template:
        src: "{{ hyprland_repo_main_config.src }}"
        dest: "{{ hyprland_repo_main_config.dest }}"
        
    - name: Link config file(s)
      ansible.builtin.file:
        src: "{{ config_file.src }}"
        dest: "{{ config_file.dest }}"
        state: link
      loop: "{{ hyprland_config_files }}"
      loop_control:
        loop_var: config_file

