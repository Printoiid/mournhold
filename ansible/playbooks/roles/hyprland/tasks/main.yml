# Hyprland - Task File
- name: Hyprland - Install and Configure
  tags: hyprland-setup

  block:
    - name: Remove config files
      ansible.builtin.file:
        state: absent
        path: "{{ hyprland_config_path }}"

    - name: Recreate hypr directory
      ansible.builtin.file:
        state: directory
        path: "{{ hyprland_config_path }}"
    
    - name: Get config files
      ansible.builtin.command:
        cmd: "ls {{ hyprland_repo_configs }}"
        register: hyprland_config_files
    - name: List config files
      ansible.builtin.debug:
        verbosity: 1
        msg: "{{ hyprland_config_files }}"

    - name: Create default config
      ansible.builtin.template:
        src: "{{ hyprland_repo_main_config.src }}"
        dest: "{{ hyprland_repo_main_config.dest }}"
