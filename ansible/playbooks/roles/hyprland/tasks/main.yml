# Hyprland - Task File
- name: Hyprland - Install and Configure
  tags: hyprland-setup

  block:
    - name: Remove config files
      ansible.builtin.file:
        state: absent
        path: "{{ hyprland_config_path }}"

    - name: Recreate hypr directory
      ansible.builtin.file:
        state: directory
        path: "{{ hyprland_config_path }}"

    - name: Recreate conf directory
      ansible.builtin.file:
        state: directory
        path: "{{ hyprland_config_path }}/conf"

    - name: Create default config
      ansible.builtin.template:
        src: "{{ hyprland_repo_main_config.src }}"
        dest: "{{ hyprland_repo_main_config.dest }}"

    - name: Copy config files into hypr/conf/ directory
      ansible.builtin.copy:
        src: "{{ hyprland_config_files.src }}"
        dest: "{{ hyprland_config_files.dest }}"

