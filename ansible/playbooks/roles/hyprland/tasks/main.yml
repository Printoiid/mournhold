# Hyprland - Task File
- name: Hyprland - Install and Configure
  tags: hyprland-setup

  block:
    # Base Hyprland setup
    - name: Remove existing hypr config files
      ansible.builtin.file:
        state: absent
        path: "{{ hyprland_config_path }}"
    - name: Link hypr config files
      ansible.builtin.file:
        src: "{{ hyprland_config_files.src }}"
        dest: "{{ hyprland_config_files.dest }}"
        state: link
    # Waybar setup
    - name: Remove existing waybar config files
      ansible.builtin.file:
        state: absent
        path: "{{ waybar_config_path }}"
    - name: Link waybar config files
      ansible.builtin.file:
        src: "{{ waybar_config_files.src }}"
        dest: "{{ waybar_config_files.dest }}"
        state: link 
    # Hyprpaper Service
    - name: Enable and Start Hyperpaper in .bashrc
      ansible.builtin.lineinfile:
        dest: "{{ hyprpaper_bash.dest }}"
        regexp: "{{ hyprpaper_bash.regexp }}"
        line: "{{ hyprpaper_bash.line }}"
