# All - Group Vars File

# True Globals
github_account: "Printoiid"
ohmyposh_theme: 'agnoster'
user_account: "nerevar"
user_account_path: "/home/{{user_account}}"
dotconfig_path: "{{ user_account_path }}/.config"
bashrc_path: "{{ user_account_path }}/.bashrc"

# Role - Git
github_repositories:
  mournhold: "https://github.com/Printoiid/mournhold.git"
  Printoiid: "https://github.com/Printoiid/Printoiid.git"

ssh_github_repositories:
  mournhold: "git@github.com:Printoiid/mournhold.git"
  Printoiid: "git@github.com:Printoiid/printoiid.git"
  qmk_firmware: "git@github.com:Printoiid/qmk_firmware.git"

mournhold_path: "{{ user_account_path }}/mournhold"
neovim_repo_config_path: "{{ mournhold_path }}/ansible/playbooks/roles/neovim/config"
kitty_repo_config_path: "{{ mournhold_path }}/ansible/playbooks/roles/kitty/config"
hyprland_repo_config_path: "{{ mournhold_path }}/ansible/playbooks/roles/hyprland"
rofi_repo_config_path: "{{ mournhold_path }}/ansible/playbooks/roles/rofi"

# Role - Packages
## Debian - Linux Mint
apt_packages:
  - package: "gcc"
  - package: "curl"
  - package: "tar"
  - package: "git"
  - package: "vlc"
  - package: "steam"
  - package: "tree"
  - package: "wget"
  - package: "kdenlive"
  - package: "keepassxc"
  - package: "build-essential"
  - package: "spotify-client"
  - package: "nvidia-driver-580"
  - package: "flameshot"
    version: "12.1.0"
    state: "fixed"
## Arch - Hyprland
pacman_packages:
  - package: "brightnessctl"
  - package: "go"
  - package: "discord"
  - package: "gcc"
  - package: "base-devel"
  - package: "unzip"
  - package: "ansible"
    state: "latest"
  - package: "firefox"
  - package: "flameshot"
  - package: "git"
  - package: "qmk"
  - package: "tree"
#  - package: "pavucontrol"
  - package: "spotify-launcher"
  - package: "keepassxc"
  - package: "hyprpaper"
  - package: "hypridle"
  - package: "hyprsunset"
  - package: "hyprpicker"
  - package: "hyprlock"
  - package: "waybar"
  - package: "rofi"
  - package: "unrar"
  - package: "xdg-desktop-portal-hyprland"
  # Fonts
#  - package: "otf-font-awesome"

pacman_packages_to_enable:
  - package: "rofi"
  - package: "brightnessctl"
  - package: "hypridle"
  - package: "hyprsunset"
  - package: "hyprlock"
  - package: "hypridle"


# Role - Homebrew
homebrew_packages:
  - neovim
#  - go
  - yt-dlp
  - talosctl
  - k9s
  - argocd
  - helm
